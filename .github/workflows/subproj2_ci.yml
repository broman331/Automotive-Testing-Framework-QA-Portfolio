name: subProj 2 CI

on:
  push:
    paths:
      - 'subProj 2 Automated ADAS AEB SiL Tester/**'
      - '.github/workflows/subproj2_ci.yml'
  pull_request:
    paths:
      - 'subProj 2 Automated ADAS AEB SiL Tester/**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: 'subProj 2 Automated ADAS AEB SiL Tester'

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install C++ Build Tools
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential g++ make

    - name: Build C++ Shared Library
      run: make

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Pytest Module
      run: |
        pytest

    - name: Upload Test Report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: subproj2-test-report
        path: 'subProj 2 Automated ADAS AEB SiL Tester/report.html'
