name: subProj 10 VectorCAST Parser

on:
  push:
    branches: [ "main" ]
    paths:
      - 'subProj 10 VectorCAST Parser/**'
      - '.github/workflows/ci_subproj10.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'subProj 10 VectorCAST Parser/**'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    
    - name: Build Docker Image
      run: |
        cd "subProj 10 VectorCAST Parser"
        docker build -t subproj10_pipeline .
        
    - name: Run Pytest in Container
      run: |
        docker run --rm subproj10_pipeline
