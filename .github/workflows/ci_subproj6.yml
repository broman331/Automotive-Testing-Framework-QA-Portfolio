name: SubProj 6 HIL Mock Dashboard CI

on:
  push:
    paths:
      - 'subProj 6 HIL Mock Dashboard/**'
      - '.github/workflows/ci_subproj6.yml'
  pull_request:
    paths:
      - 'subProj 6 HIL Mock Dashboard/**'

jobs:
  test-ui:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install System Dependencies for Headless Qt
        # pytest-qt requires a virtual framebuffer (Xvfb) and Qt platform libraries to render headless on Ubuntu servers
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libxkbcommon-x11-0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 libxcb-shape0 libxcb-xfixes0 libxcb-xinerama0

      - name: Install Python Dependencies
        working-directory: './subProj 6 HIL Mock Dashboard'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Pytest-Qt GUI Tests
        working-directory: './subProj 6 HIL Mock Dashboard'
        # Run tests inside the virtual framebuffer to simulate a graphical monitor
        run: xvfb-run --auto-servernum pytest tests/test_ui.py -v --html=report.html

      - name: Upload Test Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pyqt5-test-report
          path: './subProj 6 HIL Mock Dashboard/report.html'
          retention-days: 30
